# fly.toml app configuration file generated for adhoc-research-bot on 2026-05-01T08:11:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'adhoc-research-bot'
primary_region = 'lhr'

[build]
  dockerfile = 'dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = "shared"
  cpus = 1
